<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <button id="btnAnuncio">Ver Video</button>
    <script src="https://sad.adsgram.ai/js/adsgram.js"></script>
    <script>
        const AdController = window.Adsgram.init({ blockId: "4327" });
        document.getElementById("btnAnuncio").addEventListener("click", () => {
            AdController.show();
        });
    </script>
</body>
</html>
