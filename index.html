<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TokaBot</title>
</head>
<body>
    <button id="btnAnuncio" style="padding: 20px; font-size: 20px;">Ver Video</button>
    <div id="status" style="margin-top: 20px;">Presiona el botón para continuar</div>

    <script>
        // Tu Smartlink de Adsterra
        const smartlink = "https://www.effectivecpmnetwork.com/grmzq2cg?key=5a7f4b0d3fe224d971efa322de85fd82";

        document.getElementById("btnAnuncio").addEventListener("click", () => {
            // Esto abre el anuncio en una nueva ventana o pestaña
            window.open(smartlink, '_blank');
            document.getElementById("status").innerText = "Gracias por apoyar el bot.";
        });
    </script>
</body>
</html>
